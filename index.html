<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧸 拼豆坐标图生成器 - Perler Bead Pattern Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pink:#FF8A8A;--pink-light:#FFD4D4;--pink-dark:#FF6B6B;
  --blue:#89CFF0;--blue-light:#D4EEFA;
  --bg:#FFF5F0;--card:#FFFFFF;
  --text:#4A3A3A;--text-light:#8A7A7A;--text-muted:#C4B4AC;
  --border:#F0E0D8;--radius:20px;--radius-sm:12px;
  --shadow:0 4px 20px rgba(255,138,138,0.12);
  --shadow-hover:0 8px 32px rgba(255,138,138,0.2);
  --font:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
  --transition:0.3s cubic-bezier(0.4,0,0.2,1)
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7}
.header{background:linear-gradient(135deg,#FF9EAA,#FF7B89);color:#fff;padding:0;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 20% 30%,rgba(255,255,255,0.12) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(255,255,255,0.08) 0%,transparent 50%),radial-gradient(circle at 50% 50%,rgba(255,255,255,0.05) 0%,transparent 70%);animation:headerFloat 12s ease-in-out infinite}
@keyframes headerFloat{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(15px,-15px) rotate(0.5deg)}66%{transform:translate(-10px,10px) rotate(-0.5deg)}}
.header-inner{max-width:1400px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,0.25);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0}
.header-title{font-size:1.3em;font-weight:800;letter-spacing:0.5px}
.header-title span{color:#FFEAA7;font-weight:900}
.header-status{display:flex;align-items:center;gap:10px}
.status-dot{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-weight:600;font-size:0.8em;background:rgba(255,255,255,0.2);backdrop-filter:blur(8px);color:#fff}
.status-dot .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.verified .dot{background:#51CF66;box-shadow:0 0 8px rgba(81,207,102,0.6)}
.status-dot.unverified .dot{background:#FFEAA7;animation:blink 1.2s ease-in-out infinite}
.status-dot.idle .dot{background:rgba(255,255,255,0.4)}
.status-dot.uploaded .dot{background:#fff}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.view{display:none;animation:softIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.view.active{display:block}
@keyframes softIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.main-content{max-width:1400px;margin:0 auto;padding:24px 20px 60px}
.upload-zone{background:var(--card);border:3px dashed var(--border);border-radius:var(--radius);padding:50px 40px;text-align:center;cursor:pointer;transition:var(--transition);margin-bottom:24px;position:relative;overflow:hidden}
.upload-zone::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,138,138,0.03),rgba(137,207,240,0.03));opacity:0;transition:0.4s}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--pink);background:rgba(255,138,138,0.04);transform:translateY(-3px);box-shadow:0 12px 40px rgba(255,138,138,0.18)}
.upload-zone:hover::before,.upload-zone.drag-over::before{opacity:1}
.upload-zone.drag-over{border-color:var(--pink);border-style:solid;background:rgba(255,138,138,0.08);transform:translateY(-3px) scale(1.01)}
.upload-zone.has-image{border-color:var(--blue);border-style:solid;padding:20px;cursor:default}
.upload-icon-circle{width:88px;height:88px;margin:0 auto 16px;border-radius:50%;background:linear-gradient(135deg,var(--pink-light),var(--pink));display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(255,138,138,0.3);transition:var(--transition);position:relative;z-index:1}
.upload-zone:hover .upload-icon-circle{transform:scale(1.08) translateY(-3px);box-shadow:0 12px 36px rgba(255,138,138,0.4)}
.upload-zone .upload-text{font-size:1.15em;font-weight:700;color:var(--text);position:relative;z-index:1}
.upload-zone .upload-hint{font-size:0.88em;color:var(--text-light);margin-top:6px;position:relative;z-index:1}
.upload-zone .upload-formats{font-size:0.78em;color:var(--text-muted);margin-top:2px;position:relative;z-index:1}
.upload-browse-btn{display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:11px 32px;background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:#fff;border:none;border-radius:50px;font-size:0.92em;font-weight:700;cursor:pointer;transition:var(--transition);position:relative;z-index:1;box-shadow:0 4px 16px rgba(255,107,107,0.3)}
.upload-browse-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,107,0.4)}
.upload-browse-btn:active{transform:scale(0.96)}
.upload-info{font-size:0.82em;color:var(--text-light);margin-top:10px;position:relative;z-index:1}
.upload-info strong{color:var(--pink-dark)}
#fileInput{display:none}
.remove-image{position:absolute;top:12px;right:12px;background:rgba(255,107,107,0.85);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;display:none;z-index:5;align-items:center;justify-content:center;transition:var(--transition);backdrop-filter:blur(4px)}
.upload-zone.has-image .remove-image{display:flex}
.remove-image:hover{background:var(--pink-dark);transform:scale(1.1)}
.upload-preview{max-height:200px;max-width:100%;border-radius:var(--radius-sm);display:none;margin:0 auto;box-shadow:0 4px 16px rgba(0,0,0,0.06);position:relative;z-index:1}
.upload-zone.has-image .upload-preview{display:block}
.upload-zone.has-image .upload-icon-circle,.upload-zone.has-image .upload-text,.upload-zone.has-image .upload-hint,.upload-zone.has-image .upload-formats,.upload-zone.has-image .upload-browse-btn,.upload-zone.has-image .upload-info{display:none}
.params-panel{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:24px}
.params-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}
.param-group{display:flex;flex-direction:column;gap:6px}
.param-group label{font-size:0.82em;font-weight:700;color:var(--text-light);display:flex;align-items:center;gap:6px}
.param-group input,.param-group select{padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.92em;transition:var(--transition);background:var(--bg);color:var(--text);font-family:var(--font)}
.param-group input:focus,.param-group select:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,138,138,0.15)}
.param-group input[type=range]{padding:0;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,var(--pink-light),var(--pink));border:none}
.param-group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--pink);cursor:pointer;box-shadow:0 2px 8px rgba(255,107,107,0.3)}
.range-value{font-size:0.88em;color:var(--pink-dark);font-weight:800;min-width:28px;display:inline-block}
.param-row{display:flex;align-items:center;gap:10px}
.param-row input[type=range]{flex:1}
.toggle-group{display:flex;align-items:center;gap:10px}
.toggle{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#E8D8D0;border-radius:12px;transition:var(--transition)}
.toggle-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:var(--transition)}
.toggle input:checked+.toggle-slider{background:var(--pink)}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px)}
.key-section{background:var(--card);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.key-input-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:200px}
.key-input-wrap label{font-size:0.85em;font-weight:700;color:var(--text-light);white-space:nowrap}
.key-input-wrap input{padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:0.92em;transition:var(--transition);background:var(--bg);color:var(--text);font-family:var(--font);flex:1;min-width:120px}
.key-input-wrap input:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,138,138,0.15)}
.key-input-wrap input.success{border-color:#51CF66;background:rgba(81,207,102,0.04)}
.key-input-wrap input.error{border-color:var(--pink-dark);background:rgba(255,107,107,0.04);animation:shake 0.4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.key-status{font-size:0.82em;font-weight:700;display:flex;align-items:center;gap:6px}
.action-bar{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
.action-bar.center{justify-content:center}
.action-bar.end{justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border:none;border-radius:50px;font-size:0.92em;font-weight:700;cursor:pointer;transition:var(--transition);font-family:var(--font)}
.btn:active{transform:scale(0.96)}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--pink-dark));color:#fff;box-shadow:0 4px 16px rgba(255,107,107,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,107,0.4)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-success{background:linear-gradient(135deg,#51CF66,#2F9E44);color:#fff;box-shadow:0 4px 16px rgba(81,207,102,0.3)}
.btn-success:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(81,207,102,0.4)}
.btn-success:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{background:transparent;color:var(--text);border:2px solid var(--border)}
.btn-outline:hover{border-color:var(--pink);color:var(--pink-dark);background:rgba(255,138,138,0.04)}
.btn-danger{background:rgba(255,107,107,0.1);color:var(--pink-dark);border:2px solid rgba(255,107,107,0.2)}
.btn-danger:hover{background:var(--pink-dark);color:#fff;transform:translateY(-2px)}
.btn-sm{padding:8px 20px;font-size:0.82em}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.result-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:var(--transition)}
.result-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.result-card-header{padding:16px 20px;font-weight:700;font-size:0.92em;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.result-card-header .badge{font-size:0.7em;padding:3px 12px;border-radius:20px;margin-left:auto;font-weight:700}
.badge-pink{background:var(--pink-light);color:var(--pink-dark)}
.badge-blue{background:var(--blue-light);color:#4A90B0}
.result-card-body{padding:16px;display:flex;align-items:center;justify-content:center;min-height:360px;background:var(--bg);position:relative;overflow:hidden}
.result-card-body canvas{max-width:100%;max-height:520px;border-radius:12px;image-rendering:pixelated}
.result-empty{color:var(--text-muted);text-align:center;padding:40px}
.result-empty .icon{font-size:3em;margin-bottom:12px;display:block}
.material-section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px;transition:var(--transition)}
.material-section:hover{box-shadow:var(--shadow-hover)}
.material-header{padding:16px 20px;font-weight:700;font-size:0.92em;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.material-header small{margin-left:auto;font-size:0.78em;color:var(--text-muted);font-weight:400}
.material-body{padding:16px 20px}
.material-grid{display:flex;flex-wrap:wrap;gap:8px}
.material-chip{display:inline-flex;align-items:center;gap:8px;padding:6px 16px 6px 6px;background:var(--bg);border-radius:50px;border:1px solid var(--border);font-size:0.82em;font-weight:600;transition:var(--transition)}
.material-chip:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(255,138,138,0.12);border-color:var(--pink-light)}
.material-swatch{width:24px;height:24px;border-radius:50%;border:2px solid rgba(0,0,0,0.08);flex-shrink:0}
.material-chip .count{color:var(--text-light);font-weight:400}
.material-chip .count strong{color:var(--text);font-weight:800}
.stats-bar{display:flex;gap:20px;padding:12px 20px;background:var(--bg);border-top:1px solid var(--border);font-size:0.82em;color:var(--text-light);flex-wrap:wrap;align-items:center}
.stats-bar span{display:flex;align-items:center;gap:4px}
.stats-bar strong{color:var(--text);font-weight:800}
.loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,245,240,0.85);display:none;align-items:center;justify-content:center;border-radius:var(--radius);z-index:5}
.loading-overlay.active{display:flex}
.spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--pink);border-radius:50%;animation:rot 0.8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#4A3A3A;color:#fff;padding:14px 28px;border-radius:50px;font-size:0.9em;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.15);opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);z-index:1000;pointer-events:none;white-space:nowrap;font-family:var(--font)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media print{header,.upload-zone,.params-panel,.key-section,.action-bar,.toast{display:none!important}.result-grid{grid-template-columns:1fr}.result-card{box-shadow:none;border:1px solid var(--border)}body{background:#fff}.main-content{padding:10px}}
@media(max-width:1024px){.result-grid{grid-template-columns:1fr}}
@media(max-width:768px){.header-inner{flex-wrap:wrap;height:auto;padding:14px 20px;gap:10px}.header-status{width:100%}.status-dot{padding:4px 12px;font-size:0.75em}}
@media(max-width:640px){.header-title{font-size:1.05em}.header-logo{width:36px;height:36px;font-size:18px}.upload-zone{padding:36px 20px}.upload-icon-circle{width:72px;height:72px}.params-grid{grid-template-columns:1fr}.key-section{flex-direction:column}.key-input-wrap{flex-wrap:wrap}.action-bar{justify-content:center}.material-chip{font-size:0.78em}}
</style>
</head><body>
<header class="header"><div class="header-inner">
<div class="header-left"><div class="header-logo">🧸</div><div class="header-title">拼豆<span>坐标图</span>生成器</div></div>
<div class="header-status">
<span class="status-dot idle" id="authStatus"><span class="dot"></span>未验证</span>
<span class="status-dot idle" id="fileStatus"><span class="dot"></span>未上传</span>
</div></div></header>
<div class="main-content">
<div class="view active" id="viewUpload">
<div class="upload-zone" id="uploadZone">
<input type="file" id="fileInput" accept="image/*">
<div class="upload-icon-circle">
<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
<polyline points="17 8 12 3 7 8"/>
<line x1="12" y1="3" x2="12" y2="15"/>
</svg></div>
<div class="upload-text">点击上传或拖拽图片到此处</div>
<div class="upload-hint">支持 JPG / PNG / WebP / GIF</div>
<div class="upload-formats">建议使用清晰、对比度高的图片效果更佳</div>
<button class="upload-browse-btn" id="browseBtn" type="button" onclick="document.getElementById('fileInput').click()">🌸 选择图片</button>
<div class="upload-info" id="uploadInfo"></div>
<img class="upload-preview" id="uploadPreview" alt="preview">
<button class="remove-image" id="removeImageBtn">✕</button>
</div>
<div class="key-section">
<div class="key-input-wrap"><label>🔑 验证密钥</label><input type="text" id="keyInput" placeholder="请输入密钥"><button class="btn btn-primary btn-sm" id="verifyKeyBtn">验证</button></div>
<span class="key-status" id="keyStatus">🔒 未验证</span> <button class="btn btn-sm btn-outline" onclick="reVerify()" style="font-size:0.75em;padding:4px 10px">🔄</button>
</div>
<div class="action-bar center">
<button class="btn btn-success" id="generateBtn" disabled>✨ 生成拼豆图案</button>
<button class="btn btn-outline" id="resetBtn">🔄 重置</button>
</div></div>

<div class="params-panel"><div class="params-grid">
<div class="param-group"><label>📏 网格宽度</label><div class="param-row"><input type="range" id="gridWidth" min="8" max="80" value="24"><span class="range-value" id="gridWidthVal">24</span></div></div>
<div class="param-group"><label>📏 网格高度</label><div class="param-row"><input type="range" id="gridHeight" min="8" max="80" value="24"><span class="range-value" id="gridHeightVal">24</span></div></div>
<div class="param-group"><label>🎨 最大颜色数</label><div class="param-row"><input type="range" id="maxColors" min="4" max="60" value="30"><span class="range-value" id="maxColorsVal">30</span></div></div>
<div class="param-group"><label>🔲 背景透明</label><div class="toggle-group"><label class="toggle"><input type="checkbox" id="transparentBg"><span class="toggle-slider"></span></label><span id="transparentLabel" style="font-size:0.82em;color:var(--text-light)">关闭</span></div></div>
<div class="param-group"><label>🔄 保持比例</label><div class="toggle-group"><label class="toggle"><input type="checkbox" id="keepAspect" checked><span class="toggle-slider"></span></label><span id="keepAspectLabel" style="font-size:0.82em;color:var(--text-light)">开启</span></div></div>
</div></div>

<div class="view" id="viewResult">
<div class="result-grid">
<div class="result-card"><div class="result-card-header">🖼️ 原始图片<span class="badge badge-pink">Original</span></div><div class="result-card-body" id="resultOriginal"><div class="result-empty"><span class="icon">🌸</span><p>暂无图片</p></div><canvas id="resultOriginalCanvas" style="display:none"></canvas></div></div>
<div class="result-card"><div class="result-card-header">🧩 拼豆坐标图<span class="badge badge-blue">Bead Map</span></div><div class="result-card-body" id="resultBead"><div class="result-empty"><span class="icon">🧸</span><p>请先生成图案</p></div><canvas id="resultBeadCanvas" style="display:none"></canvas><div class="loading-overlay" id="resultLoading"><div class="spinner"></div></div></div></div>
</div>
<div class="stats-bar" id="resultStats" style="display:none"><span>📐 尺寸: <strong id="resultGridSize">0×0</strong></span><span>🧮 总珠数: <strong id="resultTotalBeads">0</strong></span><span>🎨 颜色数: <strong id="resultColorCount">0</strong></span></div>
<div class="material-section" id="materialSection" style="display:none">
<div class="material-header">🎨 所需拼豆颜色清单<small>按此清单准备拼豆材料</small></div>
<div class="material-body"><div class="material-grid" id="materialGrid"></div></div>
</div>
<div class="action-bar end">
<button class="btn btn-primary" id="exportPngBtn">💾 导出 PNG</button>
<button class="btn btn-outline" id="copyColorsBtn">📋 复制颜色清单</button>
<button class="btn btn-outline" id="regenerateBtn">✨ 重新生成</button><button class="btn btn-outline" id="backBtn">🌸 返回上传</button>
<button class="btn btn-danger" id="resetFromResultBtn">🔄 重置</button>
</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
var BP=[

{n:"深红",e:"Cranberry",h:"#B31030"},{n:"覆盆子",e:"Raspberry",h:"#D84B7A"},{n:"薰衣草",e:"Lavender",h:"#C5AEE3"},
